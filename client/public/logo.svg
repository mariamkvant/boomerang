<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Circular arrow trail - what you give comes back -->
  <path d="M60 15 A45 45 0 1 1 25 85" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 6" opacity="0.35"/>
  <polygon points="22,78 18,90 30,86" fill="#22c55e" opacity="0.5"/>
  <!-- Boomerang shape -->
  <path d="M62 28 C54 36, 38 52, 34 68 C32 76, 36 82, 42 78 C48 74, 54 62, 60 54 C66 62, 72 74, 78 78 C84 82, 88 76, 86 68 C82 52, 66 36, 62 28Z" fill="url(#grad)" stroke="#15803d" stroke-width="2"/>
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="34" y1="28" x2="86" y2="82">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Small sparkle/give-back dots -->
  <circle cx="28" cy="42" r="3" fill="#22c55e" opacity="0.6"/>
  <circle cx="92" cy="42" r="3" fill="#22c55e" opacity="0.6"/>
  <circle cx="60" cy="95" r="3" fill="#22c55e" opacity="0.6"/>
</svg>
