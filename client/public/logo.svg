<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clean minimal boomerang: a single curved V shape with a subtle return arc -->
  <!-- The boomerang itself — smooth, thick, elegant -->
  <path d="M60 22 C52 34, 34 56, 32 72 C31 80, 36 84, 42 80 C50 74, 56 60, 60 50 C64 60, 70 74, 78 80 C84 84, 89 80, 88 72 C86 56, 68 34, 60 22Z" 
    fill="url(#g)" />
  <!-- Return arc — the "comes back" element, subtle and elegant -->
  <path d="M38 86 C28 78, 22 62, 24 48 C26 36, 32 28, 38 24" 
    stroke="url(#g2)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Small arrow tip on the arc -->
  <path d="M36 28 L38 22 L42 27" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <defs>
    <linearGradient id="g" x1="32" y1="22" x2="88" y2="84">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="g2" x1="22" y1="86" x2="42" y2="22">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
</svg>
