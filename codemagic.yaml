workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "client/ios/App/App.xcodeproj"
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Create certificate and profile
        script: |
          # Write private key to file
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey.p8

          # List existing certificates first
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8 \
            --save || true

          # If no cert exists, create one
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8 \
            --save || true

          # Fetch signing files (cert + profile) automatically
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8 \
            --create

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd client/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "client/ios/App/App.xcodeproj" \
            --scheme App \
            --archive-path "client/ios/App/build/App.xcarchive"

      - name: Upload to App Store Connect
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey.p8
          app-store-connect publish \
            --path "client/ios/App/build/**/*.ipa" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @/tmp/AuthKey.p8

    artifacts:
      - client/ios/App/build/**/*.ipa
