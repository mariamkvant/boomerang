workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Fetch signing files
        script: |
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --create \
            --save
          
          echo "=== Contents of current directory ==="
          ls -la
          echo "=== Searching for p12 after fetch ==="
          find /Users/builder -name "*.p12" -type f 2>/dev/null

      - name: Set up code signing
        script: |
          keychain initialize
          
          # Write the certificate private key
          printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          
          # Find certificate files ANYWHERE on the system
          echo "=== Searching for .cer files ==="
          find /Users/builder -name "*.cer" -type f 2>/dev/null
          echo "=== Searching for .p12 files ==="
          find /Users/builder -name "*.p12" -type f 2>/dev/null
          echo "=== Searching for certificate directories ==="
          find /Users/builder -type d -name "*ertificate*" 2>/dev/null
          find /Users/builder -type d -name "*signing*" 2>/dev/null
          
          # Try to find and import the certificate
          CER_FILE=$(find /Users/builder -name "*.cer" -type f 2>/dev/null | head -1)
          P12_FILE=$(find /Users/builder -name "*.p12" -type f 2>/dev/null | head -1)
          
          if [ -n "$P12_FILE" ]; then
            echo "Importing p12: $P12_FILE"
            security import "$P12_FILE" -k "$(keychain get-default)" -P "" -T /usr/bin/codesign -A
          elif [ -n "$CER_FILE" ]; then
            echo "Converting cer to p12: $CER_FILE"
            openssl x509 -inform DER -in "$CER_FILE" -out /tmp/cert.pem 2>/dev/null || cp "$CER_FILE" /tmp/cert.pem
            openssl pkcs12 -export -inkey /tmp/cert_key.pem -in /tmp/cert.pem -out /tmp/cert.p12 -passout pass:""
            security import /tmp/cert.p12 -k "$(keychain get-default)" -P "" -T /usr/bin/codesign -A
          else
            echo "No certificate files found anywhere!"
          fi
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$(keychain get-default)"
          
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          set -e
          cd client/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App

      - name: Upload to App Store Connect
        script: |
          IPA_PATH=$(find / -name "*.ipa" -type f 2>/dev/null | head -1)
          echo "Found IPA: $IPA_PATH"
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "No IPA found!"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
