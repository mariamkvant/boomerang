workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: fyi.boomerang.app
        certificate_private_key: $CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          set -e
          cd client/ios/App
          
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning
          
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App

      - name: Upload to App Store Connect
        script: |
          IPA_PATH=$(find $CM_BUILD_DIR -name "*.ipa" -type f 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find / -name "*.ipa" -type f 2>/dev/null | head -1)
          fi
          echo "Found IPA: $IPA_PATH"
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "No IPA found!"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
