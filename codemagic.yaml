workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Fetch signing files
        script: |
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          openssl genrsa -out /tmp/cert_key.pem 2048
          CERT_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY" \
            --create

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build and export IPA
        script: |
          cd client/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=FQ8GX7UR2S \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            2>&1 | tail -50

      - name: Upload to App Store Connect
        script: |
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          app-store-connect publish \
            --path build/ios/ipa/*.ipa

    artifacts:
      - build/ios/ipa/*.ipa
      - client/ios/App/build/**/*.ipa
      - "**/*.ipa"
