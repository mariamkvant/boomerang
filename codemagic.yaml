workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "client/ios/App/App.xcodeproj"
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Create certificate and profile
        script: |
          # Debug: check env vars are set
          echo "Key ID set: $([ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] && echo YES || echo NO)"
          echo "Issuer ID set: $([ -n "$APP_STORE_CONNECT_ISSUER_ID" ] && echo YES || echo NO)"
          echo "Private key set: $([ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ] && echo YES || echo NO)"

          # Create a new certificate
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --save

          # Get the certificate ID
          CERT_ID=$(app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            | grep -o '[A-Z0-9]\{10,\}' | head -1)

          echo "Certificate ID: $CERT_ID"

          # Create provisioning profile
          app-store-connect profiles create \
            --name "Boomerang App Store" \
            --type IOS_APP_STORE \
            --bundle-id-identifier "$BUNDLE_ID" \
            --certificate-id "$CERT_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --save

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd client/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "client/ios/App/App.xcodeproj" \
            --scheme App \
            --archive-path "client/ios/App/build/App.xcarchive"

      - name: Upload to App Store Connect
        script: |
          app-store-connect publish \
            --path "client/ios/App/build/**/*.ipa" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

    artifacts:
      - client/ios/App/build/**/*.ipa
