workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "client/ios/App/App.xcodeproj"
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Fetch signing files
        script: |
          # Write the API key to the expected file location
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          
          # Generate a new RSA key for certificate signing
          openssl genrsa -out /tmp/cert_key.pem 2048
          CERT_KEY=$(cat /tmp/cert_key.pem)
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY" \
            --create

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd client/ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "client/ios/App/App.xcodeproj" \
            --scheme App

      - name: Upload to App Store Connect
        script: |
          app-store-connect publish \
            --path "client/ios/App/build/**/*.ipa"

    artifacts:
      - build/ios/ipa/*.ipa
      - client/ios/App/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
