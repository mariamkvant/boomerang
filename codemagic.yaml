workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Fetch signing files
        script: |
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          
          # Generate RSA key and save it for later use
          openssl genrsa -out $CM_BUILD_DIR/cert_key.pem 2048
          CERT_KEY=$(cat $CM_BUILD_DIR/cert_key.pem)
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY" \
            --create

      - name: Set up code signing
        script: |
          # Import the certificate private key into keychain
          # Convert PEM to p12 format
          openssl pkcs12 -export \
            -inkey $CM_BUILD_DIR/cert_key.pem \
            -in "$(find $HOME/Library/MobileDevice/Certificates -name '*.cer' -o -name '*.pem' 2>/dev/null | head -1)" \
            -out /tmp/cert.p12 \
            -passout pass:temp123 || true
          
          # Import certificates and profiles
          xcode-project use-profiles
          
          # Also import the private key directly into the keychain
          security import $CM_BUILD_DIR/cert_key.pem -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -A || \
          security import $CM_BUILD_DIR/cert_key.pem -k /Library/Keychains/System.keychain -T /usr/bin/codesign -A || true

      - name: Build and export IPA
        script: |
          cd client/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App

      - name: Find and upload IPA
        script: |
          echo "Looking for IPA files..."
          find $CM_BUILD_DIR -name "*.ipa" -type f
          IPA_PATH=$(find $CM_BUILD_DIR -name "*.ipa" -type f | head -1)
          echo "Found IPA: $IPA_PATH"
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "No IPA found!"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
