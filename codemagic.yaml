workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "fyi.boomerang.app"
      node: 22
    scripts:
      - name: Install client dependencies
        script: |
          cd client
          npm install

      - name: Build web app
        script: |
          cd client
          npm run build

      - name: Sync Capacitor
        script: |
          cd client
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd client/ios/App
          pod install || true

      - name: Set up signing
        script: |
          # Write API key
          KEY_FILE="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$HOME/private_keys"
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_FILE"
          
          # Write certificate private key
          printf '%s\n' "$CERTIFICATE_PRIVATE_KEY" > /tmp/cert_key.pem
          
          # Initialize keychain
          keychain initialize
          
          # Fetch signing files and save to specific directory
          mkdir -p /tmp/signing
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
            --certificates-dir /tmp/signing/certs \
            --profiles-dir /tmp/signing/profiles \
            --create
          
          echo "=== Files in /tmp/signing ==="
          find /tmp/signing -type f 2>/dev/null
          
          # Find the p12 file that fetch-signing-files created
          P12_FILE=$(find /tmp/signing -name "*.p12" -type f 2>/dev/null | head -1)
          CER_FILE=$(find /tmp/signing -name "*.cer" -type f 2>/dev/null | head -1)
          PROFILE_FILE=$(find /tmp/signing -name "*.mobileprovision" -type f 2>/dev/null | head -1)
          
          echo "P12: $P12_FILE"
          echo "CER: $CER_FILE"
          echo "PROFILE: $PROFILE_FILE"
          
          # Import p12 if found
          if [ -n "$P12_FILE" ]; then
            echo "Importing p12..."
            security import "$P12_FILE" -k "$(keychain get-default)" -P "" -T /usr/bin/codesign -A
          elif [ -n "$CER_FILE" ]; then
            echo "Creating p12 from cer + key..."
            openssl x509 -inform DER -in "$CER_FILE" -out /tmp/cert.pem 2>/dev/null || cp "$CER_FILE" /tmp/cert.pem
            openssl pkcs12 -export -inkey /tmp/cert_key.pem -in /tmp/cert.pem -out /tmp/cert.p12 -passout pass:""
            security import /tmp/cert.p12 -k "$(keychain get-default)" -P "" -T /usr/bin/codesign -A
          fi
          
          # Install provisioning profile
          if [ -n "$PROFILE_FILE" ]; then
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          fi
          
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$(keychain get-default)"
          
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning
          
          # Set up xcode project profiles
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd client/ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build and export IPA
        script: |
          set -e
          cd client/ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --scheme App

      - name: Upload to App Store Connect
        script: |
          IPA_PATH=$(find / -name "*.ipa" -type f 2>/dev/null | grep -v ".cocoapods" | head -1)
          echo "Found IPA: $IPA_PATH"
          if [ -n "$IPA_PATH" ]; then
            app-store-connect publish --path "$IPA_PATH"
          else
            echo "No IPA found!"
            exit 1
          fi

    artifacts:
      - "**/*.ipa"
